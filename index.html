<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rana | Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        h1 span {
            color: #00ffd5;
        }

        p {
            font-size: 1.1rem;
            margin: 10px 0;
            color: #e0e0e0;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 12px 25px;
            border-radius: 25px;
            background: #00ffd5;
            color: #000;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00c9a7;
            transform: scale(1.05);
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hello, I'm <span>RANAGEETH</span></h1>
        <p>An AIML Student </p>
        <p>Passionate about Artificial Intelligence & Machine Learning</p>

        <a href="#" class="btn">View My Work</a>

        <footer>
            © 2026 Rana | All Rights Reserved
        </footer>
    </div>

</body>
</html>
